<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#FBFAF7"/>

  <!-- Top eyebrow rule + label -->
  <text x="80" y="100" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="22" font-weight="500" fill="#1E3A8A" letter-spacing="3">FELLIPEBRITO.COM</text>
  <line x1="80" y1="120" x2="1120" y2="120" stroke="#1E3A8A" stroke-width="1.5"/>

  <!-- Main headline -->
  <text x="80" y="240" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="68" font-weight="700" fill="#0a0a0a">Christian.</text>
  <text x="80" y="325" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="68" font-weight="700" fill="#0a0a0a">Entrepreneur.</text>
  <text x="80" y="410" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="68" font-weight="700" fill="#0a0a0a">Creative problem solver.</text>

  <!-- Amber accent under final word — matches site's <mark> highlight -->
  <rect x="80" y="395" width="640" height="22" fill="#B45309" fill-opacity="0.18"/>
  <text x="80" y="410" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="68" font-weight="700" fill="#0a0a0a">Creative problem solver.</text>

  <!-- Byline -->
  <line x1="80" y1="500" x2="280" y2="500" stroke="#1E3A8A" stroke-width="1.5"/>
  <text x="80" y="540" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="26" font-weight="500" fill="#1E3A8A">Fellipe Brito · Bossa Nova Solutions</text>
  <text x="80" y="575" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="22" font-weight="400" fill="#6b6b6b">Meta · SESAC · PING · QWIRE · UVL</text>
</svg>
